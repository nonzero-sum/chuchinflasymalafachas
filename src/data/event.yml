faq:
  - question: "¿Solo adultos?"
    answer: "Sí y no, son bienvenidas a la misa personas de 0 a 100+ años, pero por políticas del hotel, la recepción, banquete y fiesta serán solo para personas mayores de 13 años."
  - question: "¿Cuál es el código de vestimenta?"
    answer: "COCKTAIL ATTIRE. NO JEANS o PANTALONES CARGO. PROCURA EVITAR EL NEGRO, ¿O QUIERES MORIR DE CALOR?"
  - question: "¿Habrá opciones de comida para personas con restricciones dietéticas?"
    answer: "Sí, por favor indícanos tus restricciones al momento de confirmar tu asistencia. A los primos de Sofi y amigos de Chucho veganos, no se preocupen, habrá opciones."
  - question: "¿Hay estacionamiento disponible en el lugar del evento?"
    answer: "Sí, el lugar cuenta con valet parking y estacionamiento gratuito para los invitados."
  - question: "¿Hay descuentos en el hotel para los invitados?"
    answer: "Sí, hemos negociado tarifas especiales en el Hotel Villa San José. Menciona nuestro nombre al hacer tu reservación."