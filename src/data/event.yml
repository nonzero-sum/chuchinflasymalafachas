story:
  chapterLabel: "Capítulo I"
  heading: "Nuestra Historia"
  body: |
    Sofía y Jesús, mejor conocidos como Chucho y Sofi, se conocieron cuando tenían 15 y 14 años, durante su primer año de preparatoria. Los años pasaron y algunas aisladas confesiones de amor fueron inevitables, así como los impedimentos, con Chucho mudándose al otro lado del país y los atados sueños artísticos de Sofi en Morelia; redujeron un amor inexplicable y casi correspondido a deseos reprimidos y encuentros afortunados vistos como accidentales. Solo bastaba el verse para volver a recopilar todo lo que amaban. El resto del tiempo, sin siquiera comunicarse, dentro de ellos continuó el anhelo impaciente de algún día alcanzar el corazón del otro.
    Gracias a Dios, y las coincidencias que nunca han sido eso: coincidencias. Desde diciembre 2022 —con el mismo interés de como cuando eran solo unos adolescentes enamorados— pesar del pasado, el miedo, la incertidumbre y la distancia: se eligieron. 
    Con un amor real, puro y sincero nacido de la amistad, ahora deciden unir sus vidas, continuando la elección de amarse cada día. Después de todo, siempre serán ellos dos.
  imageAsset: "wedshots/SC-3.jpg"
  imageAlt: "Nuestra historia"
  
schedule:
  eyebrow: "Nuestra Celebración"
  title: "AGENDA"
  description: >
    Formal. Elegante. Divertida. Solo adultos. Te mostramos la fabulosa y sencilla agenda que tenemos planeada para el gran día. Será su culpa si algo sale mal.
  events:
    - number: "01"
      label: "Misa"
      title: "CEREMONIA RELIGIOSA"
      description: >
        Esto va en serio. Con la bendición de Dios y de nuestros padres, nos casaremos en una ceremonia religiosa, celebrada por nuestro querido amigo, el padre Sergio Rosiles. Sofi, a diferencia de Chucho, tuvo que hacer su primera comunión y confirmación meses antes para esto, shame on her.
      details:
        - "Te esperamos en el Ex-Monasterio Benedictino a las 12:30 hrs"
        - "La misa comienza puntualmente a las 13:00 hrs"
    - number: "02"
      label: "Cocktail hour"
      title: "RECEPCIÓN"
      description: >
        ¡No tendremos que movernos tanto! Tampoco será necesario regresar a casa. A tan solo unos minutos de la iglesia, nos reuniremos para empezar a celebrar a los novios con una cervecita.
      details:
        - "Área de alberca a las 14:30 hrs"
    - number: "03"
      label: "Dinner"
      title: "BANQUETE"
      description: >
        Nos pasaremos al Salón Principal, donde podremos disfrutar de una deliciosa comida a las 16:00 hrs.
      details:
        - ""
    - number: "04"
      label: "Celebración"
      title: "BODORRIO"
      description: >
        Aunque no queramos, la tradición nos obliga a pararnos frente a todos ustedes, fingiendo que no nos da pena bailar. Después de eso, podremos disfrutar de la fiesta, la música y muchos drinks, si Dios lo permite.
      details:
        - "Primer baile a las 18:00 hrs"
        - "Fiesta a las 18:30 hrs"
        - "Borrachera desde antes, porfa."
    - number: "05"
      label: "Despedida"
      title: "BYE BYE"
      description: >
        No queremos que la fiesta termine, pero en algún momento tendremos que despedirnos. Si no nos encuentran, no se preocupen. Ahí nos mandan un beso.
      details:
        - "Nos corren a las 23:00 hrs"

